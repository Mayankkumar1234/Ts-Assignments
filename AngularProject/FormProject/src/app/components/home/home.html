<div id="productContainer">
  <app-header></app-header>
  <div id="productSection">
    <h1>Inside the Home Page</h1>
    @for (product of productsArr; track product?.id) {
      <div class="product">
        <a [routerLink]="[product.id]">
          <img style="width: 100px" [src]="product?.thumbnail" alt="" />
          <h4>{{ product?.title }}</h4>
          <h4>{{ product?.category }}</h4>
          <h4>{{ product?.price }}</h4>
          <p>{{ product?.rating }}</p>
        </a>
      </div>
    }

    <div id="pagination">
      @for (page of pages; track page) {
        <button>{{ page }}</button>
      }
    </div>
  </div>
</div>

<main>
  <router-outlet></router-outlet>
</main>
